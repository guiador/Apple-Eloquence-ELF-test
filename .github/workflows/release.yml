# Release workflow for apple-eloquence-elf
#
# Builds end-user tarballs on Linux from the Apple Mach-O dylibs already
# committed under vendor/.  No macOS runner needed: everything (the
# macho2elf conversion, sd_eloquence module build, packaging) happens
# on Linux.
#
# Matrix targets x86_64 and aarch64 natively so each tarball ships a
# correctly-built sd_eloquence binary plus the per-arch ELFs.
#
# Trigger:
#   - push of a version-looking tag (v*, pre-*, or a leading-digit semver
#     like 0.1.0) -> upload artifacts to a GitHub Release
#   - manual workflow_dispatch    -> build the artifacts without releasing
#     (useful for sanity-checking the pipeline)

name: Release

on:
  push:
    tags:
      - 'v*'
      - 'pre-*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # Both arches ship. The arm64 converter gaps that used to make
        # synthesis segfault on real hardware are fixed (high8-tagged rebases,
        # the Apple->AAPCS64 variadic ABI bridge, __chkstk_darwin, and the
        # libc++ DT_NEEDED chain); arm64 output now produces byte-near-identical
        # audio to x86_64. Built natively on each arch's runner.
        include:
          - arch: x86_64
            lipo_arch: x86_64
            runner: ubuntu-24.04
            cc: gcc
          - arch: aarch64
            lipo_arch: arm64    # Mach-O fat-binary slice name (Apple's name)
            runner: ubuntu-24.04-arm
            cc: gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              python3-pip python3-venv \
              llvm \
              gcc binutils \
              libc++-dev libc++abi-dev \
              cmake pkg-config \
              libsoxr-dev \
              build-essential autoconf automake libtool gettext autopoint \
              intltool texinfo \
              libltdl-dev libdotconf-dev libglib2.0-dev libpulse-dev \
              libsndfile1-dev libsystemd-dev \
              curl
          # Ubuntu's llvm package only installs llvm-lipo-NN; symlink the
          # newest one as the unversioned name so the rest of the workflow
          # can just call `llvm-lipo`.
          if ! command -v llvm-lipo >/dev/null; then
              LIPO=$(ls /usr/bin/llvm-lipo-* 2>/dev/null | sort -V | tail -1)
              if [ -z "$LIPO" ]; then
                  echo "no llvm-lipo* binary found after installing llvm" >&2
                  exit 1
              fi
              sudo ln -sf "$LIPO" /usr/local/bin/llvm-lipo
          fi
          llvm-lipo --version | head -2
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install lief

      - name: Build speech-dispatcher (native module SDK)
        # Ubuntu noble's libspeechd-dev does not ship spd_module_main.h or
        # libspeechd_module.so even though it packages 0.12.0-rc2. Build
        # speech-dispatcher from upstream into /usr/local so the native
        # module SDK is available for the cmake step below.
        run: |
          mkdir -p /tmp/speechd && cd /tmp/speechd
          curl -fsSL -o speechd.tar.gz \
              https://github.com/brailcom/speechd/archive/refs/tags/0.12.0.tar.gz
          tar xzf speechd.tar.gz --strip-components=1
          ls -la
          # autoreconf bootstraps configure from configure.ac regardless of
          # whether the upstream ships build.sh / autogen.sh.
          autoreconf -fi
          # We installed only libpulse-dev for audio + autotools / glib /
          # ltdl / dotconf for the build. TTS engines (espeak-ng, flite,
          # pico, ibmtts ...) auto-skip with no dev deps installed.
          ./configure --prefix=/usr/local --disable-python
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
          # Make pkg-config see the /usr/local install first.
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/local/lib" >> "$GITHUB_ENV"
          echo "--- post-install diagnostics ---"
          find /usr/local -name 'spd_module_main.h' -o -name 'libspeechd_module*' || true
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig pkg-config --modversion speech-dispatcher
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig pkg-config --variable=modulebindir speech-dispatcher

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
              echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sd_eloquence
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SD_MODULE=ON \
              -DBUILD_EXAMPLES=OFF \
              -DINSTALL_PREBUILT_DYLIBS=OFF
          cmake --build build -j"$(nproc)"
          file build/sd_eloquence

      - name: Convert vendor dylibs -> ELFs
        run: |
          mkdir -p slices elfs
          for d in vendor/tvOS-18.2/*.dylib; do
              base="$(basename "$d" .dylib)"
              llvm-lipo -extract ${{ matrix.lipo_arch }} "$d" \
                  -output "slices/${base}.${{ matrix.lipo_arch }}.dylib"
          done
          for slice in slices/*.dylib; do
              base="$(basename "$slice" .${{ matrix.lipo_arch }}.dylib)"
              ./venv/bin/python3 macho2elf/macho2elf.py "$slice" \
                  --cc "${{ matrix.cc }}" \
                  -o "elfs/${base}.so" \
                  --workdir "build/${base}_work"
          done
          ls -la elfs/

      - name: Stage tarball
        id: stage
        run: |
          NAME="apple-eloquence-elf-${{ steps.ver.outputs.version }}-linux-${{ matrix.arch }}"
          STAGE="stage/${NAME}"
          mkdir -p "${STAGE}/lib"
          cp elfs/*.so "${STAGE}/lib/"
          cp build/sd_eloquence "${STAGE}/"
          # Bundle libspeechd_module.so.0 next to sd_eloquence: Ubuntu
          # noble's distro package doesn't ship this helper as a shared
          # library at all, even though sd_eloquence (built against our
          # upstream speech-dispatcher 0.12.0 install) needs it.  The
          # binary has RPATH=$ORIGIN, so a copy next to it on disk wins.
          # -P preserves the symlink chain (so.0 -> so.0.0.0).
          cp -P /usr/local/lib/libspeechd_module.so.0* "${STAGE}/"
          cp sd_eloquence/eloquence.conf "${STAGE}/"
          cp dist/install.sh "${STAGE}/install.sh"
          cp dist/uninstall.sh "${STAGE}/uninstall.sh"
          chmod +x "${STAGE}/install.sh" "${STAGE}/uninstall.sh"

          # Path= entries reference /usr/lib/eloquence (install.sh's default).
          python3 - "${STAGE}/eci.ini" <<'PY'
          import sys, pathlib
          DATA_DIR = "/usr/lib/eloquence"
          TRIPLES = [
              ("1.0", "enu.so", None), ("1.1", "eng.so", None),
              ("2.0", "esp.so", None), ("2.1", "esm.so", None),
              ("3.0", "fra.so", None), ("3.1", "frc.so", None),
              ("4.0", "deu.so", None),
              ("5.0", "ita.so", None),
              ("6.0", "chs.so", "chsrom.so"), ("6.1", "cht.so", "chtrom.so"),
              ("7.0", "ptb.so", None),
              ("8.0", "jpn.so", "jpnrom.so"),
              ("9.0", "fin.so", None),
              ("10.0", "kor.so", "korrom.so"),
          ]
          lines = [
              "# Generated by apple-eloquence-elf install. Each section binds an",
              "# eciLanguageDialect code to a language .so the engine dlopens at runtime.",
              "# CJK entries also list a Path_Rom= romanizer; without it the language",
              "# modules fail eciNewEx with 'No Romanizer Error'.",
              "",
          ]
          for sect, so, rom in TRIPLES:
              lines.append(f"[{sect}]")
              lines.append(f"Path={DATA_DIR}/{so}")
              if rom:
                  lines.append(f"Path_Rom={DATA_DIR}/{rom}")
              lines.append("Version=6.1")
              lines.append("")
          pathlib.Path(sys.argv[1]).write_text("\n".join(lines))
          PY

          # Resampler audio previews.  Render once per release so users can
          # audition each EloquenceResampleRate / Quality / Phase / Steep
          # preset without trial-and-error in eloquence.conf.  The render
          # tool dlopens the converted eci.so + enu.so against a one-line
          # ini, synthesizes a fixed pangram at 11025 Hz, then runs that
          # through sd_eloquence's libsoxr wrapper with each combination.
          #
          # Rendered on both arches now that arm64 synthesis works. Each runs
          # natively on its own runner, so render_resampler_previews exercises
          # the arch-native eci.so/enu.so.
          mkdir -p "${STAGE}/share/eloquence/resampler-previews"
          mkdir -p preview-work
          cp "${STAGE}/lib/eci.so" "${STAGE}/lib/enu.so" preview-work/
          cat > preview-work/eci.ini <<'EOI'
          [1.0]
          Path=./enu.so
          Version=6.1
          EOI
          ./build/render_resampler_previews preview-work "${STAGE}/share/eloquence/resampler-previews"

          cat > "${STAGE}/README.txt" <<EOF
          apple-eloquence-elf ${{ steps.ver.outputs.version }} (${{ matrix.arch }})

          Native ETI Eloquence TTS for Linux, derived from Apple's bundled
          TextToSpeechKonaSupport.framework.

          Quick install:
              sudo ./install.sh

          Then restart speech-dispatcher and try it:
              spd-say -o eloquence "Hello from Eloquence."

          Customize voice / language / sample rate in:
              /etc/speech-dispatcher/modules/eloquence.conf

          Resampler audio previews (after install):
              ls /usr/share/eloquence/resampler-previews/
              paplay /usr/share/eloquence/resampler-previews/rate-44100.wav

          Uninstall:
              sudo ./uninstall.sh         (keeps eloquence.conf)
              sudo ./uninstall.sh --purge (also removes eloquence.conf)

          Runtime deps (install via your distro):
              libc++ libc++abi    (Debian: libc++1 libc++abi1)
              libsoxr (optional)  (Debian: libsoxr0)

          Source / issues: https://github.com/Mudb0y/Apple-Eloquence-ELF
          EOF

          # gzip rather than zstd so the tarball extracts with stock
          # tar on every distro (minimal images don't ship zstd).
          # No external .sha256 -- GitHub's Releases page already shows
          # SHA256 next to every asset.
          TARBALL="${NAME}.tar.gz"
          tar -C stage -czf "${TARBALL}" "${NAME}"
          ls -la "${TARBALL}"

          echo "name=${NAME}"       >> "$GITHUB_OUTPUT"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: ${{ steps.stage.outputs.tarball }}
          retention-days: 7

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect tarballs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble release assets
        run: |
          mkdir -p release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Extract CHANGELOG section for this tag
        # Pulls the `## [VERSION] — DATE` section out of CHANGELOG.md so
        # softprops/action-gh-release uses it as the release body instead
        # of just the "What's Changed" auto-list.  Fails if the section
        # isn't there -- forces CHANGELOG.md to be updated alongside any
        # tag push.
        run: |
          VER="${GITHUB_REF_NAME}"
          awk -v ver="${VER}" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/        { exit }
              capture                    { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
              echo "::error::CHANGELOG.md has no entry for ${VER}" >&2
              exit 1
          fi
          echo "----- release-notes.md preview -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-notes.md
          fail_on_unmatched_files: true

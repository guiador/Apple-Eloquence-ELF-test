name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm python3-pip python3-venv
        LIPO=$(ls /usr/bin/llvm-lipo-* 2>/dev/null | sort -V | tail -1)
        if [ ! -z "$LIPO" ]; then sudo ln -sf "$LIPO" /usr/local/bin/llvm-lipo; fi
        python3 -m venv venv
        ./venv/bin/pip install --upgrade pip
        ./venv/bin/pip install lief

    - name: Instalar Android NDK r27c
      run: |
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"

    - name: Convertir y preparar librerías nativas
      run: |
        export ANDROID_NDK="${ANDROID_HOME}/ndk/27.2.12479018"
        chmod +x ./android/stage-libs.sh
        PATH="${GITHUB_WORKSPACE}/venv/bin:$PATH" ./android/stage-libs.sh 24

    - name: Compilar APK de depuración
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
